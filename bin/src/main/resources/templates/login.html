<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            /*--primary: #2563eb;*/
			--primary: #3392ED;
            --bg: #f4f6f9;
            /*--text: #1f2937;*/
			--text: #3392ED;
            --border: #d1d5db;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;						
        }

        .login-card {
            /*background: #ffffff;*/
			background: #f2f2f2;
            width: 100%;
            max-width: 380px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
			
			/*background-image: url('/images/backgroundBisnet.jpg');
		    background-size: cover;
		    background-position: center;
		    background-repeat: no-repeat;*/
        }

        /*.login-card h1 {
            margin: 0 0 1.5rem;
            font-size: 1.5rem;
            text-align: center;
            color: var(--text);
        }*/

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: .9rem;
            margin-bottom: .4rem;
            color: #4b5563;
        }

        input {
            width: 100%;
            padding: .7rem .8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: .6rem;
            border-radius: 8px;
            font-size: .85rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .logout {
            background: #e0f2fe;
            color: #075985;
            padding: .6rem;
            border-radius: 8px;
            font-size: .85rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        button {
            width: 100%;
            padding: .75rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
			font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        @media (max-width: 420px) {
            .login-card {
                padding: 1.5rem;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
		
		.logo-container {
		    text-align: center;
		    margin-bottom: 1rem;
		}

		.logo {
		    max-width: 260px;
		    width: 100%;
		    height: auto;
		}
		
		@media (max-width: 420px) {
		    .logo {
		        max-width: 140px;
		    }
		}
    </style>
</head>
<body>

<div class="login-card">

	<div class="logo-container">
		<img src="/images/logoBisnet.png" alt="Bisnet" class="logo">
	</div>
	
    <!--<h1>Iniciar sesión</h1>-->

    <!-- Mensaje de error Spring Security -->
    <div class="error" th:if="${param.error}">
        Usuario o contraseña incorrectos
    </div>

    <!-- Mensaje logout -->
    <div class="logout" th:if="${param.logout}">
        Sesión cerrada correctamente
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label for="username">Usuario</label>
            <input id="username"
                   name="username"
                   type="text"
                   required
                   autofocus>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password"
                   name="password"
                   type="password"
                   required>
        </div>

        <button type="submit">ACEPTAR</button>
    </form>

</div>

</body>
</html>
